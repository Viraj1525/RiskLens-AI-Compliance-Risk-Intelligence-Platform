# Docker Compose loads a root `.env` file automatically for ${VAR} substitution in this file.
# Either copy `.env.production` to `.env`, or run:
#   docker compose --env-file .env.production build
#   docker compose --env-file .env.production up -d

services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    env_file:
      - .env.production
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"

networks:
  default:
    name: ai-compliance-network
